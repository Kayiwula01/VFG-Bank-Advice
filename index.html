<div id="app-root"></div>

<style>
  #app-root {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    color: #1A2332;
    max-width: 900px;
    margin: 0 auto;
    padding: 4px 2px 32px 2px;
  }
  #app-root * { box-sizing: border-box; }
  .cav-card { background: #FFFFFF; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; border: 1px solid #E5E8EC; }
  .cav-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .cav-logo-img { height: 44px; width: auto; flex-shrink: 0; }
  .cav-title { font-size: 17px; font-weight: 700; margin: 0; letter-spacing: -0.01em; line-height: 1.3; }
  .cav-tagline { font-size: 12.5px; font-style: italic; color: #000080; margin: 2px 0 0 0; }
  .cav-form-title { font-size: 14px; font-weight: 700; color: #1A2332; margin: 6px 0 0 0; letter-spacing: 0.02em; }
  .cav-subtitle { font-size: 13px; color: #6B7684; margin: 2px 0 0 0; }
  .cav-section-label { font-size: 11.5px; font-weight: 700; letter-spacing: 0.04em; color: #8891A0; text-transform: uppercase; margin-bottom: 12px; }
  .cav-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 560px) { .cav-grid2 { grid-template-columns: 1fr; } }
  .cav-field { display: flex; flex-direction: column; gap: 5px; font-size: 12.5px; color: #4A5566; }
  .cav-input { padding: 9px 11px; border-radius: 7px; border: 1px solid #D8DCE2; font-size: 13.5px; font-family: inherit; color: #1A2332; outline: none; width: 100%; }
  .cav-input:focus { border-color: #0B3D2E; box-shadow: 0 0 0 3px rgba(11,61,46,0.08); }
  table.cav-table { width: 100%; border-collapse: collapse; min-width: 680px; }
  .cav-table th { text-align: left; font-size: 10.5px; font-weight: 700; color: #8891A0; text-transform: uppercase; letter-spacing: 0.03em; padding: 0 8px 8px 8px; border-bottom: 1px solid #E5E8EC; }
  .cav-table td { padding: 5px 8px; vertical-align: middle; }
  .cav-cell-input { padding: 7px 8px; border-radius: 6px; border: 1px solid #E5E8EC; font-size: 13px; font-family: inherit; width: 100%; color: #1A2332; outline: none; }
  .cav-cell-input:focus { border-color: #0B3D2E; }
  .cav-table-scroll { overflow-x: auto; }
  .cav-add-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 600; color: #0B3D2E; background: #EAF3EF; border: none; border-radius: 7px; padding: 7px 12px; cursor: pointer; }
  .cav-add-btn:hover { background: #DCEBE4; }
  .cav-trash-btn { display: inline-flex; align-items: center; justify-content: center; color: #B3261E; background: transparent; border: none; cursor: pointer; padding: 4px; }
  .cav-trash-btn:hover { color: #7A1913; }
  .cav-words-line { font-size: 11px; color: #8891A0; padding: 2px 4px; }
  .cav-total-row { margin-top: 12px; padding-top: 12px; border-top: 1px solid #E5E8EC; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .cav-total-words { font-size: 12.5px; color: #6B7684; max-width: 480px; }
  .cav-total-amount { font-size: 20px; font-weight: 700; color: #0B3D2E; white-space: nowrap; }
  .cav-error { background: #FDECEC; color: #B3261E; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; }
  .cav-success { background: #EAF3EF; color: #0B3D2E; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; }
  .cav-btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .cav-btn-primary, .cav-btn-secondary { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; border-radius: 9px; padding: 11px 18px; cursor: pointer; flex: 1; justify-content: center; min-width: 180px; border: none; }
  .cav-btn-primary { color: #FFFFFF; background: #FF5B00; }
  .cav-btn-primary:hover { background: #E65200; }
  .cav-btn-secondary { color: #FFFFFF; background: #FF5B00; }
  .cav-btn-secondary:hover { background: #E65200; }
  .cav-btn-primary:disabled, .cav-btn-secondary:disabled { opacity: 0.55; cursor: not-allowed; }
</style>

/* ---------- Number to words (Ghana Cedis) ---------- */
var ONES = ['', 'ONE', 'TWO', 'THREE', 'FOUR', 'FIVE', 'SIX', 'SEVEN', 'EIGHT', 'NINE', 'TEN',
  'ELEVEN', 'TWELVE', 'THIRTEEN', 'FOURTEEN', 'FIFTEEN', 'SIXTEEN', 'SEVENTEEN', 'EIGHTEEN', 'NINETEEN'];
var TENS = ['', '', 'TWENTY', 'THIRTY', 'FORTY', 'FIFTY', 'SIXTY', 'SEVENTY', 'EIGHTY', 'NINETY'];

function threeDigits(n) {
  var s = '';
  if (n >= 100) {
    s += ONES[Math.floor(n / 100)] + ' HUNDRED';
    n %= 100;
    if (n > 0) s += ' AND ';
  }
  if (n >= 20) {
    s += TENS[Math.floor(n / 10)];
    if (n % 10 > 0) s += '-' + ONES[n % 10];
  } else if (n > 0) {
    s += ONES[n];
  }
  return s.trim();
}

function numberToWords(num) {
  if (num === 0) return 'ZERO';
  var groups = [
    { value: 1000000000, label: 'BILLION' },
    { value: 1000000, label: 'MILLION' },
    { value: 1000, label: 'THOUSAND' },
  ];
  var n = Math.floor(num);
  var parts = [];
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    if (n >= g.value) {
      var count = Math.floor(n / g.value);
      parts.push(threeDigits(count) + ' ' + g.label);
      n %= g.value;
    }
  }
  if (n > 0) parts.push(threeDigits(n));
  return parts.join(' ').replace(/\s+/g, ' ').trim();
}

function amountInWords(amount) {
  var num = parseFloat(amount);
  if (isNaN(num) || num < 0) return '';
  var cedis = Math.floor(num);
  var pesewas = Math.round((num - cedis) * 100);
  var words = numberToWords(cedis) + ' GHANA CEDIS';
  if (pesewas > 0) {
    words += ' AND ' + numberToWords(pesewas) + ' PESEWAS';
  }
  return words + ' ONLY';
}

function formatMoney(amount) {
  var num = parseFloat(amount);
  if (isNaN(num)) return '0.00';
  return num.toLocaleString('en-GH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function formatDateDMY(iso) {
  if (!iso) return '';
  var parts = iso.split('-');
  return parts[2] + '/' + parts[1] + '/' + parts[0];
}

function formatDateHeader(iso) {
  if (!iso) return '';
  var parts = iso.split('-');
  return parts[2] + '-' + parts[1] + '-' + parts[0];
}

function formatDateLong(iso) {
  if (!iso) return '';
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var parts = iso.split('-');
  return parseInt(parts[2],10) + ' ' + months[parseInt(parts[1],10)-1] + ', ' + parts[0];
}

/* ---------- Event handlers ---------- */
function attachHandlers() {
  document.getElementById('f-letterDate').addEventListener('change', function(e){ state.letterDate = e.target.value; });
  document.getElementById('f-releaseDate').addEventListener('change', function(e){ state.releaseDate = e.target.value; });
  document.getElementById('f-branchManagerLine').addEventListener('input', function(e){ state.branchManagerLine = e.target.value; });
  document.getElementById('f-accountNumber').addEventListener('input', function(e){ state.accountNumber = e.target.value; });
  document.getElementById('f-bankName').addEventListener('input', function(e){ state.bankName = e.target.value.toUpperCase(); e.target.value = state.bankName; });
  document.getElementById('f-branchName').addEventListener('input', function(e){ state.branchName = e.target.value.toUpperCase(); e.target.value = state.branchName; });
  document.getElementById('f-preparedBy').addEventListener('input', function(e){ state.preparedBy = e.target.value; });
  document.getElementById('f-preparedByTitle').addEventListener('input', function(e){ state.preparedByTitle = e.target.value; });
  document.getElementById('f-approvedBy').addEventListener('input', function(e){ state.approvedBy = e.target.value; });
  document.getElementById('f-approvedByTitle').addEventListener('input', function(e){ state.approvedByTitle = e.target.value; });

  document.getElementById('btn-add-row').addEventListener('click', function(){
    state.rows.push(makeRow());
    render();
  });

  var body = document.getElementById('cav-rows-body');
  Array.prototype.forEach.call(body.querySelectorAll('[data-remove-row]'), function(btn){
    btn.addEventListener('click', function(){
      var id = parseInt(btn.getAttribute('data-remove-row'), 10);
      if (state.rows.length > 1) {
        state.rows = state.rows.filter(function(r){ return r.id !== id; });
        render();
      }
    });
  });

  Array.prototype.forEach.call(body.querySelectorAll('tr'), function(tr){
    var id = parseInt(tr.getAttribute('data-row-id'), 10);
    Array.prototype.forEach.call(tr.querySelectorAll('[data-field]'), function(input){
      var evt = input.type === 'date' ? 'change' : 'input';
      input.addEventListener(evt, function(e){
        var fieldName = input.getAttribute('data-field');
        var row = null;
        for (var i = 0; i < state.rows.length; i++) { if (state.rows[i].id === id) { row = state.rows[i]; break; } }
        if (!row) return;
        var val = e.target.value;
        if (fieldName === 'payee') val = val.toUpperCase();
        row[fieldName] = val;
        if (fieldName === 'amount' || fieldName === 'payee') {
          var cursorPos = e.target.selectionStart;
          var wasFocused = document.activeElement === e.target;
          renderTotalsOnly();
          if (wasFocused && fieldName === 'payee') {
            var newInput = document.querySelector('tr[data-row-id="' + id + '"] [data-field="payee"]');
            if (newInput) { newInput.focus(); try { newInput.setSelectionRange(cursorPos, cursorPos); } catch(err){} }
          }
        }
      });
    });
  });

  document.getElementById('btn-gen-docx').addEventListener('click', function(){ handleGenerate('docx'); });
  document.getElementById('btn-gen-pdf').addEventListener('click', function(){ handleGenerate('pdf'); });
}

  var wordsPreviewContainer = document.getElementById('cav-words-preview');
  if (wordsPreviewContainer) {

      .map(function(r) {
        return '<div class="cav-words-line">' + escapeHtml(r.chequeNo || '\u2014') + ': ' + escapeHtml(amountInWords(r.amount)) + '</div>';

function validate() {
  if (!state.bankName.trim()) return 'Bank name is required.';
  if (!state.branchName.trim()) return 'Branch name is required.';
  if (!state.accountNumber.trim()) return 'Account number is required.';
  var validRows = state.rows.filter(function(r){ return r.payee.trim() || r.chequeNo.trim() || r.amount; });
  if (validRows.length === 0) return 'Add at least one cheque entry.';
  for (var i = 0; i < validRows.length; i++) {
    var r = validRows[i];
    if (!r.payee.trim()) return 'Every row needs a payee name.';
    if (!r.chequeNo.trim()) return 'Every row needs a cheque number.';
    if (!r.amount || parseFloat(r.amount) <= 0) return 'Every row needs a valid amount.';
  }
  return '';
}

function dataUrlToUint8Array(dataUrl) {
  var base64 = dataUrl.split(',')[1];
  var binary = atob(base64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

/* ---------- Generate handler ---------- */
function librariesReady(format) {
  if (format === 'docx') {
    return !!(window.docx && window.docx.Document && window.docx.Packer && window.saveAs);
  }
  return !!(window.jspdf && window.jspdf.jsPDF);
}

function handleGenerate(format) {
  var err = validate();
  if (err) { showMessage(escapeHtml(err), 'error'); return; }
  clearMessage();

  var btnId = format === 'docx' ? 'btn-gen-docx' : 'btn-gen-pdf';
  var btn = document.getElementById(btnId);
  var originalHtml = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = 'Generating\u2026';

  function restoreButton() {
    btn.disabled = false;
    btn.innerHTML = originalHtml;
  }

  // Libraries load asynchronously; wait briefly for them if not yet ready
  var waited = 0;
  function attemptGenerate() {
    if (!librariesReady(format)) {
      waited += 150;
      if (waited < 6000) {
        setTimeout(attemptGenerate, 150);
        return;
      }
      showMessage('The ' + (format === 'docx' ? 'Word' : 'PDF') + ' generator could not load. Check your internet connection and reload this file, then try again.', 'error');
      restoreButton();
      return;
    }
    try {
      var filenameSafe = 'Cheque_Advice_' + state.releaseDate;
      if (format === 'docx') {
        generateDocxBlob().then(function(blob) {
          saveAs(blob, filenameSafe + '.docx');
          showMessage('Word document generated and downloaded.', 'success');
          restoreButton();
        }).catch(function(e) {
          showMessage('Could not generate the Word document: ' + escapeHtml(e.message), 'error');
          restoreButton();
        });
      } else {
        var doc = generatePdfDoc();
        doc.save(filenameSafe + '.pdf');
        showMessage('PDF generated and downloaded.', 'success');
        restoreButton();
      }
    } catch (e) {
      showMessage('Something went wrong: ' + escapeHtml(e.message), 'error');
      restoreButton();
    }
  }

  attemptGenerate();
}

/* ---------- Init ---------- */
render();

})();
